<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invitation</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body style="background-color: #f8f5f0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
  
  <div style="text-align: center;">
    <h2>Confirming your invitation...</h2>
    <p>The secure password window should pop up automatically.</p>
    <p>If it doesn't open, click the button below:</p>
    <button onclick="window.netlifyIdentity.open('signup')" style="padding: 10px 20px; background-color: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
      Open Password Screen
    </button>
  </div>

  <script>
    // Force open the widget immediately upon reading the incoming hash token
    document.addEventListener("DOMContentLoaded", function() {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.open("signup");
        
        // As soon as they set their password and log in, bounce them to the dashboard
        window.netlifyIdentity.on("login", function() {
          window.location.href = "/admin/index.html";
        });
      }
    });
  </script>
</body>
</html>
