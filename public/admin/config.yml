backend:
  name: git-gateway
  branch: main

# local_backend: true

media_folder: 'public/images/homepage'
public_folder: '/images/homepage'

collections:
  - name: 'homepage'
    label: 'Homepage Content'
    delete: false
    editor:
      preview: false
    files:
      - file: 'src/content/homepage/data.json'
        label: 'Main Landing Page'
        name: 'landing'
        fields:
          - {
              label: 'Header Navigation Title',
              name: 'headerTitle',
              widget: 'string',
              required: false
            }
          - {
              label: 'Main Article Title',
              name: 'coverTitle',
              widget: 'markdown',
              buttons: ['bold', 'italic'],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }
          - {
              label: 'Main Article Intro',
              name: 'coverIntro',
              widget: 'text',
              required: false
            }
          - {
              label: 'Cover Image',
              name: 'coverImage',
              widget: 'image',
              required: false
            }
          - {
              label: 'Cover Image Caption',
              name: 'coverCaption',
              widget: 'string',
              required: false
            }
          - {
              label: 'YouTube Embed URL',
              name: 'videoUrl',
              widget: 'string',
              required: false
            }

          # Intro block (SUPAS data context)
          - {
              label: 'Text Section 1 (Intro)',
              name: 'textSection1',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Characters Section
          - {
              label: 'Section 2 Title (Characters)',
              name: 'section2Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 2',
              name: 'textSection2',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          - label: 'Character Stories'
            name: 'characters'
            widget: 'list'
            required: false
            summary: '{{fields.name}}'
            fields:
              - { label: 'Name', name: 'name', widget: 'string', required: false }
              - { label: 'Job Title', name: 'job', widget: 'string', required: false }
              - { label: 'Age', name: 'age', widget: 'string', required: false }
              - {
                  label: 'Theme Color',
                  name: 'color',
                  widget: 'select',
                  options: ['bg-blue-500', 'bg-pink-500', 'bg-emerald-500'],
                  required: false
                }
              - {
                  label: 'Profile Image',
                  name: 'image',
                  widget: 'image',
                  required: false
                }
              - { label: 'Full Story', name: 'story', widget: 'text', required: false }

          # Timeline
          - {
              label: 'Show Timeline',
              name: 'showTimeline',
              widget: 'boolean',
              default: false,
              required: false
            }
          - label: 'Timeline Events'
            name: 'timeline'
            widget: 'list'
            required: false
            summary: '{{fields.year}}'
            fields:
              - { label: 'Year / Heading', name: 'year', widget: 'string', required: false }
              - { label: 'Description', name: 'text', widget: 'text', required: false }
              - {
                  label: 'Timeline Image',
                  name: 'image',
                  widget: 'image',
                  required: false
                }

          # Section 3: Harapan
          - {
              label: 'Section 3 Title (Harapan)',
              name: 'section3Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 3',
              name: 'textSection3',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Section 4: Batasan Kerja
          - {
              label: 'Section 4 Title (Batasan)',
              name: 'section4Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 4',
              name: 'textSection4',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Section 5: Tekanan
          - {
              label: 'Section 5 Title (Tekanan)',
              name: 'section5Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 5',
              name: 'textSection5',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Graphics / Jakpat Data
          - {
              label: 'Graphic Image (Portrait)',
              name: 'graphic2A',
              widget: 'image',
              required: false
            }
          - {
              label: 'Graphic Caption',
              name: 'graphic2ACaption',
              widget: 'string',
              required: false
            }

          # Section 6: Pakar
          - {
              label: 'Section 6 Title (Pakar)',
              name: 'section6Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 6',
              name: 'textSection6',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Section 7: Faktor
          - {
              label: 'Section 7 Title (Faktor)',
              name: 'section7Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 7',
              name: 'textSection7',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Section 8: Bertahan
          - {
              label: 'Section 8 Title (Bertahan/Dark BG)',
              name: 'section8Title',
              widget: 'string',
              required: false
            }
          - {
              label: 'Text Section 8',
              name: 'textSection8',
              widget: 'markdown',
              buttons:
                [
                  'bold',
                  'italic',
                  'link',
                  'heading-three',
                  'quote',
                  'bulleted-list'
                ],
              editor_components: [],
              modes: ['rich_text'],
              required: false
            }

          # Editorial Credits Fields
          - {
              label: 'Credits Section Title',
              name: 'creditsTitle',
              widget: 'string',
              default: 'Tim Redaksi & Produksi',
              required: false
            }
          - {
              label: 'Writer Name(s)',
              name: 'creditWriter',
              widget: 'string',
              default: 'Anginette Yoni',
              required: false
            }
          - {
              label: 'Researcher Name(s)',
              name: 'creditResearcher',
              widget: 'string',
              default: 'Anginette Yoni',
              required: false
            }
          - {
              label: 'Editor Name(s)',
              name: 'creditEditor',
              widget: 'string',
              default: 'Anginette Yoni, Darren Antonio',
              required: false
            }
          - {
              label: 'Video Director Name(s)',
              name: 'creditVideoDirector',
              widget: 'string',
              default: 'Anginette Yoni, Darren Antonio',
              required: false
            }
          - {
              label: 'Video Editor Name(s)',
              name: 'creditVideoEditor',
              widget: 'string',
              default: 'Richard Yohanes',
              required: false
            }
          - {
              label: 'Web Editor Name(s)',
              name: 'creditWebEditor',
              widget: 'string',
              default: 'Mario Richie Lim',
              required: false
            }

          - {
              label: 'Final Footer Message',
              name: 'footerMessage',
              widget: 'text',
              required: false
            }
          - {
              label: 'AI Disclaimer',
              name: 'aiDisclaimer',
              widget: 'text',
              default: 'Some visual assets and content components within this article were generated with the assistance of Artificial Intelligence.',
              required: false
            }